<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Всё до Урала помнит своих</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8B0000">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Иконка -->
    <link rel="icon" type="image/png" href="icon.png">
</head>
<body>

    <!-- Шапка -->
    <header class="app-header">
        <div class="logo-area">
            <img src="icon.png" alt="Logo" class="header-icon">
            <div>
                <h1>Урал Помнит</h1>
                <p class="subtitle">Полная версия | Средний Урал</p>
            </div>
        </div>
        <button id="randomHeroBtn" class="random-btn" title="Случайный герой">🎲</button>
    </header>

    <!-- Панель управления -->
    <div class="controls-container">
        <input type="text" id="searchInput" placeholder="Поиск (фамилия, район, звание)..." class="search-bar">
        
        <div class="filters-row">
            <select id="districtFilter" class="filter-select">
                <option value="all">Все районы</option>
                <option value="Калининский">Калининский</option>
                <option value="Кировский">Кировский</option>
                <option value="Ленинский">Ленинский</option>
                <option value="Верхняя Пышма">Верхняя Пышма</option>
            </select>
            
            <select id="typeFilter" class="filter-select">
                <option value="all">Все статусы</option>
                <option value="frontovik">Фронтовики</option>
                <option value="tyl">Труженики тыла</option>
            </select>
        </div>
        
        <div class="stats-bar">
            <span id="statsDisplay">Найдено: 0</span>
            <span class="divider">|</span>
            <span id="totalDisplay">Всего: 0</span>
        </div>
    </div>

    <!-- Сетка героев -->
    <main id="heroesContainer" class="heroes-grid">
        <!-- Карточки генерируются JS -->
    </main>

    <!-- Модальное окно: Детали героя -->
    <div id="modalDetails" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <img id="modalImg" src="" alt="Hero" class="modal-img">
            <div class="modal-body">
                <h2 id="modalName"></h2>
                <div class="modal-tags">
                    <span id="modalRank" class="badge"></span>
                    <span id="modalType" class="badge type-badge"></span>
                    <span id="modalDistrict" class="badge district-badge"></span>
                    <span id="modalYears" class="badge years-badge"></span>
                </div>
                <p id="modalStory" class="modal-story"></p>
                <div class="modal-location-box">
                    📍 <strong>Место памяти:</strong><br>
                    <span id="modalLocation"></span>
                </div>
                <button class="action-btn" onclick="shareHero()">📢 Поделиться историей</button>
                <button class="secondary-btn" onclick="alert('Спасибо! Вы сохранили память об этом герое.')">❤️ Я помню</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно: Добавить историю -->
    <div id="modalAdd" class="modal">
        <div class="modal-content small-modal">
            <span class="close-btn-add">&times;</span>
            <h2>Добавить историю</h2>
            <p>Расскажите о своем герое. Данные будут отправлены на модерацию.</p>
            <form id="addStoryForm" onsubmit="submitStory(event)">
                <input type="text" placeholder="ФИО Героя" required class="form-input">
                <textarea placeholder="Краткая биография" rows="4" required class="form-input"></textarea>
                <input type="text" placeholder="Район / Город" required class="form-input">
                <button type="submit" class="action-btn">Отправить на проверку</button>
            </form>
        </div>
    </div>

    <!-- Футер -->
    <footer>
        <p>Проект студента МВД | Средний Урал © 2024</p>
        <button class="add-story-footer-btn" onclick="openAddModal()">➕ Добавить историю семьи</button>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
